<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ポーカーAI テーブル</title>
<style>
  :root {
    --felt-1: #1c6b46;
    --felt-2: #145235;
    --felt-edge: #0a2e20;
    --rail: #4a2f18;
    --rail-hi: #7a5230;
    --gold: #ffd54f;
    --gold-soft: #ffe082;
    --ink: #10231a;
    --card-red: #d32f2f;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", "Hiragino Sans", sans-serif;
    background: radial-gradient(120% 120% at 50% 0%, #16352450 0%, #0a1811 70%), #0a1811;
    color: #fff; margin: 0; padding: 14px; min-height: 100vh;
  }

  /* ---- Top bar ---- */
  #topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; max-width: 960px; margin-left: auto; margin-right: auto; }
  #topbar h1 { font-size: 16px; margin: 0 10px 0 0; letter-spacing: .04em; }
  #topbar .rooms { display: flex; gap: 6px; }
  .roombtn { background: rgba(255,255,255,.08); color: #cfe9dd; border: 1px solid rgba(255,255,255,.12);
             border-radius: 999px; font-size: 12px; padding: 6px 14px; cursor: pointer; font-weight: 600; }
  .roombtn:hover { background: rgba(255,255,255,.16); color: #fff; }
  .badge { background: rgba(0,0,0,.4); color: var(--gold); border: 1px solid rgba(255,213,79,.35);
           border-radius: 999px; font-size: 12px; padding: 4px 12px; font-weight: 700; }
  .badge.stage { color: #a7ffe0; border-color: rgba(128,203,196,.4); }

  /* ---- Table ---- */
  #tableWrap { max-width: 960px; margin: 0 auto; }
  #table {
    position: relative; width: 100%; padding-top: 58%;
    background:
      radial-gradient(80% 90% at 50% 42%, var(--felt-1) 0%, #14523596 55%, var(--felt-edge) 100%);
    border-radius: 50% / 50%;
    border: 14px solid var(--rail);
    box-shadow:
      inset 0 0 0 3px rgba(255,213,79,.18),
      inset 0 0 70px rgba(0,0,0,.55),
      0 18px 40px rgba(0,0,0,.5);
  }
  /* felt sheen + centre line */
  #table::before {
    content: ""; position: absolute; inset: 6%;
    border-radius: 50% / 50%;
    border: 1px solid rgba(255,255,255,.06);
    pointer-events: none;
  }

  /* ---- Seats ---- */
  .seat { position: absolute; transform: translate(-50%, -50%); width: 150px;
          background: linear-gradient(180deg, rgba(8,20,15,.82), rgba(8,20,15,.62));
          border-radius: 12px; padding: 7px 10px 8px; text-align: center;
          border: 1.5px solid rgba(255,255,255,.08);
          box-shadow: 0 4px 14px rgba(0,0,0,.4);
          transition: border-color .2s, opacity .3s, box-shadow .2s; }
  .seat.turn { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(255,213,79,.5), 0 0 22px rgba(255,213,79,.45); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 2px rgba(255,213,79,.5), 0 0 14px rgba(255,213,79,.35);} 50% { box-shadow: 0 0 0 2px rgba(255,213,79,.7), 0 0 26px rgba(255,213,79,.6);} }
  .seat.folded { opacity: .4; filter: grayscale(.4); }
  .seat.out { opacity: .22; }
  .seat .name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .seat .style { font-size: 10px; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .seat .chips { font-size: 12px; color: #b2dfdb; font-weight: 600; margin-top: 3px; }
  .seat .chips::before { content: "●"; color: var(--gold); font-size: 9px; margin-right: 4px; vertical-align: 1px; }
  .seat .rev { min-height: 0; margin-top: 4px; }

  /* ---- Action bubble ---- */
  .bubble { position: absolute; left: 50%; transform: translateX(-50%); top: -24px;
            font-size: 11px; font-weight: 700; padding: 3px 11px; border-radius: 999px;
            background: #eee; color: #222; white-space: nowrap; opacity: 0; transition: opacity .2s;
            box-shadow: 0 3px 8px rgba(0,0,0,.35); }
  .bubble.show { opacity: 1; }
  .bubble.fold { background: #9e9e9e; color: #fff; }
  .bubble.call { background: #4a90d9; color: #fff; }
  .bubble.raise { background: #e5443b; color: #fff; }
  .bubble.allin { background: #9c37b0; color: #fff; }

  /* ---- Bet chip on felt ---- */
  .bet { position: absolute; transform: translate(-50%, -50%);
         background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 60%, #e0a800);
         color: var(--ink); font-size: 11px; font-weight: 800; border-radius: 999px;
         padding: 4px 10px; border: 2px dashed rgba(255,255,255,.6);
         box-shadow: 0 3px 8px rgba(0,0,0,.4); }

  /* ---- Centre: pot + board ---- */
  #center { position: absolute; left: 50%; top: 47%; transform: translate(-50%, -50%); text-align: center; width: 80%; }
  #pot { font-size: 14px; color: var(--gold); font-weight: 800; margin-bottom: 8px; letter-spacing: .02em; }
  #pot .pill { display: inline-block; background: rgba(0,0,0,.4); border: 1px solid rgba(255,213,79,.4);
               border-radius: 999px; padding: 3px 14px; }
  #board { min-height: 46px; }

  /* ---- Cards ---- */
  .card { display: inline-block; position: relative; background: #fff; color: var(--ink);
          border-radius: 6px; width: 34px; height: 46px; margin: 0 3px; vertical-align: middle;
          box-shadow: 0 3px 6px rgba(0,0,0,.4); text-align: left; }
  .card .idx { position: absolute; top: 2px; left: 4px; font-size: 12px; font-weight: 800; line-height: 1; }
  .card .idx .s { display: block; font-size: 11px; margin-top: 0; }
  .card .pip { position: absolute; bottom: 1px; right: 4px; font-size: 20px; line-height: 1; opacity: .85; }
  .card.red { color: var(--card-red); }
  .card.back { background: repeating-linear-gradient(45deg, #3949ab 0 6px, #303f9f 6px 12px);
               border: 2px solid #c5cae9; }
  .card.back .idx, .card.back .pip { display: none; }
  .card.sm { width: 20px; height: 28px; margin: 0 1.5px; border-radius: 4px; }
  .card.sm .idx { font-size: 8px; top: 1px; left: 2px; }
  .card.sm .idx .s { font-size: 8px; }
  .card.sm .pip { display: none; }
  .card.deal { animation: deal .32s ease; }
  @keyframes deal { from { opacity: 0; transform: translateY(-10px) scale(.85);} to { opacity: 1; transform: none;} }

  #winprob { text-align: center; color: #80cbc4; font-size: 14px; font-weight: 700; min-height: 20px; margin-top: 6px; }
  #mycards { position: absolute; left: 50%; bottom: -10px; transform: translate(-50%, 100%); }
  #mycards .card { width: 40px; height: 55px; }
  #mycards .card .idx { font-size: 14px; }
  #mycards .card .pip { font-size: 24px; }

  /* ---- Overlay ---- */
  #overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
             background: rgba(0,0,0,.6); border-radius: 50% / 50%; z-index: 5; }
  #overlay .msg { font-size: 27px; font-weight: 800; color: var(--gold); text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,.6); }

  /* ---- Action bar / bet panel ---- */
  #actionBar { max-width: 640px; margin: 60px auto 8px; min-height: 56px; }
  .actrow { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; align-items: stretch; }
  button { font-size: 15px; padding: 11px 18px; border: 0; border-radius: 12px; cursor: pointer; font-weight: 700; }
  button.act { background: var(--gold); color: var(--ink); }
  button.act:hover { background: var(--gold-soft); }
  button.danger { background: #ef9a9a; color: #4a1010; }
  button.danger:hover { background: #ffb3b3; }
  button.plain { background: rgba(255,255,255,.14); color: #dbeee6; }
  button.plain:hover { background: rgba(255,255,255,.24); }
  .callbtn small { display: block; font-size: 10px; font-weight: 600; opacity: .8; }

  /* bet sizing panel */
  #betPanel { background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.1);
              border-radius: 14px; padding: 12px 16px; margin-top: 10px; }
  #betPanel .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  #betPanel .head .label { font-size: 12px; color: #a7c9bd; }
  #betPanel .head .amt { font-size: 22px; font-weight: 800; color: var(--gold); }
  #betPanel .head .amt small { font-size: 11px; color: #a7c9bd; font-weight: 600; margin-left: 4px; }
  #betSlider { width: 100%; accent-color: var(--gold); height: 22px; }
  #betPanel .ticks { display: flex; justify-content: space-between; margin: 2px 2px 10px; }
  #betPanel .ticks button { background: rgba(255,255,255,.08); color: #cfe9dd; font-size: 12px;
                            padding: 6px 10px; border-radius: 999px; flex: 1; margin: 0 3px; }
  #betPanel .ticks button.on { background: var(--gold); color: var(--ink); }
  #betPanel .confirm { display: flex; gap: 8px; }
  #betPanel .confirm button { flex: 1; }
  #betNote { text-align: center; font-size: 10px; color: #7fa99c; margin-top: 6px; }

  #hint { text-align: center; color: var(--gold); font-size: 13px; min-height: 20px; max-width: 720px; margin: 8px auto 0; }
  #log { max-width: 640px; margin: 12px auto; background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.06);
         border-radius: 10px; padding: 10px 14px; font-size: 12px; max-height: 130px; overflow-y: auto;
         white-space: pre-wrap; line-height: 1.5; }

  @media (max-width: 640px) {
    body { padding: 8px; }
    #topbar h1 { font-size: 14px; }
    #table { padding-top: 84%; border-width: 9px; }
    .seat { width: 96px; padding: 5px 6px 6px; border-radius: 9px; }
    .seat .name { font-size: 11px; }
    .seat .style { display: none; }
    .seat .chips { font-size: 10px; }
    .card { width: 26px; height: 36px; }
    .card .idx { font-size: 10px; }
    .card .pip { font-size: 15px; }
    #mycards .card { width: 34px; height: 47px; }
    .card.sm { width: 16px; height: 22px; }
    .bubble { font-size: 10px; top: -18px; padding: 2px 8px; }
    .bet { font-size: 10px; padding: 3px 8px; }
    #pot { font-size: 12px; }
    button { font-size: 13px; padding: 9px 12px; }
    #actionBar { margin-top: 34px; }
    #overlay .msg { font-size: 20px; }
    #log { font-size: 11px; max-height: 100px; }
    #betPanel .head .amt { font-size: 18px; }
  }
</style>
</head>
<body>
<div id="topbar">
  <h1>♠ ポーカーAI テーブル</h1>
  <div class="rooms">
    <button class="roombtn" onclick="createT('beginner')">初級</button>
    <button class="roombtn" onclick="createT('intermediate')">中級</button>
    <button class="roombtn" onclick="createT('advanced')">上級</button>
  </div>
  <span class="badge" id="blind">未開始</span>
  <span class="badge stage" id="stage"></span>
</div>

<div id="tableWrap">
  <div id="table">
    <div id="center">
      <div id="pot"></div>
      <div id="board"></div>
    </div>
    <div id="overlay"><div class="msg" id="overlayMsg"></div></div>
  </div>
</div>

<div id="actionBar"></div>
<div id="winprob"></div>
<div id="hint"></div>
<div id="log"></div>

<script>
let tid = null, lastHandNo = 0, lastCount = 0, loggedShowdown = 0;
const NAMES = {0:"フォールド",1:"チェック/コール",2:"1/2ポット",3:"ポット",4:"オールイン"};
const BUBBLE = {0:["フォールド","fold"],1:["コール/チェック","call"],2:["レイズ (1/2ポット)","raise"],3:["レイズ (ポット)","raise"],4:["オールイン!","allin"]};
const POS = {0:[50,90],1:[15,74],2:[13,26],3:[50,9],4:[87,26],5:[85,74]};
const BETPOS = {0:[50,68],1:[28,62],2:[27,36],3:[50,26],4:[73,36],5:[72,62]};
const SUITS = {S:"♠", H:"♥", D:"♦", C:"♣"};
let seatEls = {}, folded = new Set();
let shownBoard = [];              // cards currently displayed on the board
let renderChain = Promise.resolve();

const sleep = ms => new Promise(r => setTimeout(r, ms));

function cardHtml(c, opts) {
  opts = opts || {};
  const red = (c[0] === "H" || c[0] === "D") ? " red" : "";
  const sm = opts.sm ? " sm" : "";
  const deal = opts.deal ? " deal" : "";
  const rank = c[1] === "T" ? "10" : c[1];
  const suit = SUITS[c[0]];
  return `<span class="card${red}${sm}${deal}"><span class="idx">${rank}<span class="s">${suit}</span></span><span class="pip">${suit}</span></span>`;
}
function cardBack(sm) { return `<span class="card back${sm ? " sm" : ""}"></span>`; }

function log(msg) {
  const el = document.getElementById("log");
  el.innerHTML = msg + "\n" + el.innerHTML;
}
const TOKEN = new URLSearchParams(location.search).get("token");

async function api(path, opts) {
  if (TOKEN) path += (path.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) { log("エラー: " + JSON.stringify(data.detail)); throw data; }
  return data;
}

function buildSeats(v) {
  const table = document.getElementById("table");
  Object.values(seatEls).forEach(e => { e.seat.remove(); e.bet.remove(); });
  seatEls = {};
  for (const s of Object.keys(v.standings.stacks)) {
    const info = v.seats[s] || {name: "あなた", style: "プレイヤー", description: ""};
    const seat = document.createElement("div");
    seat.className = "seat";
    seat.style.left = POS[s][0] + "%";
    seat.style.top = POS[s][1] + "%";
    seat.title = info.description || "";
    seat.innerHTML = `<div class="bubble" id="bub${s}"></div>
      <div class="name">${s == 0 ? "🧑 " : ""}${info.name}</div>
      <div class="style">${info.style}</div>
      <div class="chips" id="chips${s}"></div>
      <div class="rev" id="rev${s}"></div>
      ${s == 0 ? '<div id="mycards"></div>' : ''}`;
    table.appendChild(seat);
    const bet = document.createElement("div");
    bet.className = "bet";
    bet.style.left = BETPOS[s][0] + "%";
    bet.style.top = BETPOS[s][1] + "%";
    bet.style.display = "none";
    table.appendChild(bet);
    seatEls[s] = {seat, bet};
  }
}

async function createT(level) {
  const v = await api("/tournaments", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({level})});
  tid = v.tournament_id;
  lastHandNo = 0; lastCount = 0; folded = new Set(); shownBoard = [];
  document.getElementById("log").innerHTML = "";
  document.getElementById("board").innerHTML = "";
  document.getElementById("overlay").style.display = "none";
  log(`トーナメント開始 (${level})`);
  buildSeats(v);
  render(v);
}
async function sendAction(id) {
  const v = await api(`/tournaments/${tid}/action`, {method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({action:id})});
  render(v);
}
async function nextHand() {
  const v = await api(`/tournaments/${tid}/next`, {method:"POST"});
  render(v);
}
async function getHint() {
  const h = await api(`/tournaments/${tid}/hint`);
  document.getElementById("hint").textContent =
    `ヒント: 「${NAMES[h.recommended_action.id]}」 — ${h.reason || ""}`;
}

function showBubble(s, actId, amount) {
  const b = document.getElementById("bub" + s);
  if (!b) return;
  if (amount != null) {
    b.textContent = "レイズ " + amount;
    b.className = "bubble show raise";
  } else {
    const [label, cls] = BUBBLE[actId];
    b.textContent = label;
    b.className = "bubble show " + cls;
  }
  if (actId === 0) folded.add(String(s));
}

/* ---- Board runout: deal streets; stagger only when the human is still in the hand ---- */
async function revealBoard(target, dramatic) {
  const boardEl = document.getElementById("board");
  target = target || [];
  if (target.length < shownBoard.length) { shownBoard = []; boardEl.innerHTML = ""; }
  if (target.length === 0) { shownBoard = []; boardEl.innerHTML = ""; return; }
  while (shownBoard.length < target.length) {
    // flop deals up to 3 at once, then one card per street (turn / river)
    const next = shownBoard.length < 3 ? Math.min(3, target.length) : shownBoard.length + 1;
    const chunk = target.slice(shownBoard.length, next);
    chunk.forEach(c => boardEl.insertAdjacentHTML("beforeend", cardHtml(c, {deal: true})));
    shownBoard = target.slice(0, next);
    if (dramatic && shownBoard.length < target.length) await sleep(700);
  }
}

function render(v) { renderChain = renderChain.then(() => applyState(v)).catch(e => console.error(e)); }

async function applyState(v) {
  const st = v.standings;
  document.getElementById("blind").textContent = `ハンド ${st.hand_no} / BB ${st.big_blind}`;
  document.getElementById("stage").textContent = v.stage || "";
  document.getElementById("hint").textContent = "";

  // --- new hand: reset per-hand visuals ---
  if (st.hand_no !== lastHandNo) {
    lastHandNo = st.hand_no; lastCount = 0; folded = new Set(); shownBoard = [];
    document.querySelectorAll(".bubble").forEach(b => b.className = "bubble");
    document.querySelectorAll(".rev").forEach(r => r.innerHTML = "");
    document.getElementById("board").innerHTML = "";
    if (st.hand_no > 1) log(`--- ハンド ${st.hand_no} (BB ${st.big_blind}) ---`);
  }

  // --- action bubbles + log ---
  const acts = v.hand_actions || [];
  for (let i = lastCount; i < acts.length; i++) {
    const a = acts[i];
    const nm = a.seat === 0 ? "あなた" : ((v.seats[a.seat] && v.seats[a.seat].name) || "席" + a.seat);
    showBubble(a.seat, a.action_id, a.amount);
    log(`${nm}: ${a.amount != null ? "レイズ " + a.amount : BUBBLE[a.action_id][0]}`);
  }
  lastCount = acts.length;

  // --- stacks / bets / turn / opponent face-down cards ---
  for (const s of Object.keys(st.stacks)) {
    const el = seatEls[s]; if (!el) continue;
    document.getElementById("chips" + s).textContent = st.stacks[s] + " チップ";
    const out = st.stacks[s] <= 0;
    const isFolded = folded.has(String(s));
    el.seat.classList.toggle("out", out);
    el.seat.classList.toggle("folded", isFolded && !out);
    el.seat.classList.remove("turn");
    const b = (v.bets || {})[s];
    if (b && b > 0) { el.bet.textContent = b; el.bet.style.display = "block"; }
    else { el.bet.style.display = "none"; }
    if (s != 0) {
      const rev = document.getElementById("rev" + s);
      if (rev) {
        if (out || isFolded) rev.innerHTML = "";
        else if (!v.hand_finished) rev.innerHTML = cardBack(true) + cardBack(true);
        // if finished & still in: leave for showdown reveal below
      }
    }
  }
  if (v.my_turn && seatEls[0]) seatEls[0].seat.classList.add("turn");

  // --- pot / winprob / my cards ---
  document.getElementById("pot").textContent = "";
  if (v.pot != null) document.getElementById("pot").innerHTML = `<span class="pill">💰 ポット ${v.pot}</span>`;
  document.getElementById("winprob").textContent =
    v.win_probability != null ? `推定勝率: ${Math.round(v.win_probability * 100)}%` : "";
  const mc = document.getElementById("mycards");
  if (mc) mc.innerHTML = (v.hand || []).map(c => cardHtml(c)).join("");

  // hold the action bar while a hand resolves
  const bar = document.getElementById("actionBar");
  if (v.hand_finished && !st.finished) bar.innerHTML = `<div class="actrow"><span style="color:#b2dfdb">ショーダウン...</span></div>`;

  // --- board runout: dramatic only while the human is still contesting the pot ---
  const humanLive = !!(v.hand && v.hand.length) && !folded.has("0");
  await revealBoard(v.public_cards || [], humanLive);

  // --- showdown reveal (after the board is fully out) ---
  if (v.hand_finished && v.showdown && loggedShowdown !== st.hand_no) {
    loggedShowdown = st.hand_no;
    const sd = v.showdown;
    for (const s of Object.keys(sd.hands)) {
      if (s != 0) {
        const el = document.getElementById("rev" + s);
        if (el) el.innerHTML = sd.hands[s].map(c => cardHtml(c, {sm: true})).join("");
      }
      const nm = s == 0 ? "あなた" : ((v.seats[s] && v.seats[s].name) || "席" + s);
      const rank = sd.rank_names[s] ? ` (${sd.rank_names[s]})` : "";
      log(`📖 ${nm}: ${sd.hands[s].join(" ")}${rank}`);
    }
    if (sd.winners && sd.winners.length) {
      const wn = sd.winners.map(w => w == 0 ? "あなた" : ((v.seats[w] && v.seats[w].name) || "席" + w)).join(", ");
      log(`💰 このハンドの勝者: ${wn}`);
    }
  }

  // --- action bar / bet panel ---
  bar.innerHTML = "";
  if (st.finished) {
    const w = v.seats[st.winner] ? v.seats[st.winner].name : "あなた";
    document.getElementById("overlayMsg").textContent = `🏆 優勝: ${w}`;
    document.getElementById("overlay").style.display = "flex";
    log(`トーナメント終了。優勝: ${w}`);
  } else if (v.my_turn) {
    renderActions(v);
  } else if (v.hand_finished) {
    bar.innerHTML = `<div class="actrow"><button class="act" onclick="nextHand()">次のハンドへ ▶</button></div>`;
  } else {
    bar.innerHTML = `<div class="actrow"><span style="color:#b2dfdb">AIの手番...</span></div>`;
  }
}

/* ---- Build the action bar: fold / check-call as buttons, raise as a free-amount slider ---- */
function renderActions(v) {
  const bar = document.getElementById("actionBar");
  const legal = (v.legal_actions || []).map(a => a.id);
  const has = id => legal.includes(id);

  const bets = v.bets || {};
  const myBet = Number(bets["0"] || 0);
  const maxBet = Math.max(0, ...Object.values(bets).map(Number));
  const toCall = v.to_call != null ? Number(v.to_call) : Math.max(0, maxBet - myBet);

  // top row: fold + check/call + hint
  let top = `<div class="actrow">`;
  if (has(0)) top += `<button class="danger" onclick="sendAction(0)">フォールド</button>`;
  if (has(1)) {
    top += toCall > 0
      ? `<button class="act callbtn" onclick="sendAction(1)">コール<small>${toCall} チップ</small></button>`
      : `<button class="act" onclick="sendAction(1)">チェック</button>`;
  }
  top += `<button class="plain" onclick="getHint()">💡 ヒント</button>`;
  top += `</div>`;
  bar.innerHTML = top;

  if (!(has(2) || has(3) || has(4))) return;  // no raise available

  // Preferred: free-amount slider when the server reports a raise range
  if (v.raise_max != null && v.raise_min != null && Number(v.raise_max) > maxBet) {
    buildBetSlider(bar, v, toCall, maxBet);
  } else {
    buildDiscretePanel(bar, has);  // fallback for an older server
  }
}

/* free bet sizing: slider over [raise_min .. raise_max] (chips, engine units) */
function buildBetSlider(bar, v, toCall, maxBet) {
  const pot = Number(v.pot || 0);
  const min = Number(v.raise_min), max = Number(v.raise_max);
  const clamp = x => Math.max(min, Math.min(max, Math.round(x)));
  const halfTo = clamp(maxBet + (pot + toCall) / 2);
  const potTo = clamp(maxBet + pot + toCall);
  const def = potTo;
  const step = 1;  // 1チップ刻み。max(オールイン)が必ず格子に乗るので「1点残り」を防ぐ

  const panel = document.createElement("div");
  panel.id = "betPanel";
  panel.innerHTML = `
    <div class="head">
      <span class="label">レイズ先（チップ）</span>
      <span class="amt"><span id="betAmt">${def}</span></span>
    </div>
    <input type="range" id="betSlider" min="${min}" max="${max}" step="${step}" value="${def}"
      oninput="document.getElementById('betAmt').textContent = this.value">
    <div class="ticks">
      <button onclick="setBet(${halfTo})">½ポット</button>
      <button onclick="setBet(${potTo})">ポット</button>
      <button onclick="setBet(${max})">オールイン</button>
    </div>
    <div class="confirm">
      <button class="act" onclick="sendRaise(document.getElementById('betSlider').value)">この額でレイズ</button>
    </div>
    <div id="betNote">${min} 〜 ${max} チップで自由に。コール ${toCall} を含む総額です。</div>`;
  bar.appendChild(panel);
}

function setBet(x) {
  const s = document.getElementById("betSlider"); if (!s) return;
  x = Math.max(Number(s.min), Math.min(Number(s.max), Math.round(x)));
  s.value = x;
  document.getElementById("betAmt").textContent = x;
}
async function sendRaise(amount) {
  const v = await api(`/tournaments/${tid}/action`, {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({action: 3, amount: Math.round(Number(amount))})});
  render(v);
}

/* fallback: plain discrete size buttons */
function buildDiscretePanel(bar, has) {
  const row = document.createElement("div");
  row.className = "actrow";
  let h = "";
  if (has(2)) h += `<button class="act" onclick="sendAction(2)">½ポット</button>`;
  if (has(3)) h += `<button class="act" onclick="sendAction(3)">ポット</button>`;
  if (has(4)) h += `<button class="act" onclick="sendAction(4)">オールイン</button>`;
  row.innerHTML = h;
  bar.appendChild(row);
}
</script>
</body>
