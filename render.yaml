services:
  - type: web
    name: poker-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ACCESS_TOKEN
        sync: false   # ダッシュボードで好きな合言葉を設定する
      - key: PYTHON_VERSION
        value: 3.11.9
